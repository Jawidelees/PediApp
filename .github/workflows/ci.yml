name: CI/CD Pipeline - Clínica Pediátrica SaaS

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ===========================
  # JOB 1: Lint & Type Check
  # ===========================
  quality:
    name: '🔍 Code Quality'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

  # ===========================
  # JOB 2: Build
  # ===========================
  build:
    name: '🏗️ Build'
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}

  # ===========================
  # JOB 3: Security Audit
  # ===========================
  security:
    name: '🛡️ Security Scan'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: NPM Audit (High + Critical)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for potential hardcoded secrets..."
          # Check for common secret patterns
          if grep -rn "password\s*=\s*['\"]" src/ --include="*.ts" --include="*.tsx" | grep -v "hashSync\|compareSync\|type.*password\|label.*Password\|placeholder\|credentials\.\|\.password" | head -5; then
            echo "⚠️ Potential hardcoded password found"
          fi
          if grep -rn "NEXT_PUBLIC_.*KEY\|sk_live\|pk_live" src/ --include="*.ts" --include="*.tsx" | head -5; then
            echo "⚠️ Potential exposed API key found"
          fi
          echo "✅ Secret scan complete"

      - name: Verify tenant scoping in actions
        run: |
          echo "Checking server actions for tenant scoping..."
          ACTIONS_DIR="src/actions"
          UNSAFE=0
          for file in $ACTIONS_DIR/*.ts; do
            if grep -l "prisma\." "$file" | grep -v "audit.ts" | grep -v "setup.ts" | grep -v "super-admin.ts" > /dev/null 2>&1; then
              if ! grep -q "withTenant\|SUPER_ADMIN" "$file"; then
                echo "⚠️ $file uses prisma directly without withTenant()"
                UNSAFE=1
              fi
            fi
          done
          if [ $UNSAFE -eq 1 ]; then
            echo "❌ Some actions may lack tenant scoping"
            exit 1
          fi
          echo "✅ All actions properly scoped"

  # ===========================
  # JOB 4: Prisma Schema Validation
  # ===========================
  schema:
    name: '🗃️ Schema Validation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma Schema
        run: npx prisma validate

      - name: Check for clinicId in tenant models
        run: |
          echo "Verifying all tenant models have clinicId..."
          MODELS=("User" "DoctorProfile" "PatientProfile" "Service" "Appointment" "InventoryItem" "Invoice" "MedicalRecord" "TreatmentPlan" "GrowthRecord" "VaccinationRecord")
          SCHEMA="prisma/schema.prisma"
          for model in "${MODELS[@]}"; do
            if ! awk "/model $model/,/^}/" "$SCHEMA" | grep -q "clinicId.*String"; then
              echo "❌ Model $model is missing required clinicId field"
              exit 1
            fi
          done
          echo "✅ All tenant models have clinicId"

      - name: Check for deletedAt in soft-delete models
        run: |
          echo "Verifying soft-delete support..."
          MODELS=("User" "PatientProfile" "DoctorProfile" "Service" "Appointment" "InventoryItem" "Invoice" "MedicalRecord" "TreatmentPlan" "GrowthRecord" "VaccinationRecord")
          SCHEMA="prisma/schema.prisma"
          for model in "${MODELS[@]}"; do
            if ! awk "/model $model/,/^}/" "$SCHEMA" | grep -q "deletedAt"; then
              echo "❌ Model $model is missing deletedAt for soft delete"
              exit 1
            fi
          done
          echo "✅ All models support soft delete"
