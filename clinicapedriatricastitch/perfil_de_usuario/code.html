<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13a4ec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101c22",
                    },
                    fontFamily: {
                        "display": ["Inter"]

                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},

    }

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen pb-24">
<!-- Header -->
<header class="sticky top-0 z-50 bg-white dark:bg-background-dark border-b border-slate-200 dark:border-slate-800 px-4 py-4 flex items-center justify-between">
<div class="flex items-center gap-3">
<button class="flex h-10 w-10 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-xl font-bold">Profile Settings</h1>
</div>
<button class="text-primary font-semibold text-sm">Save Changes</button>
</header>
<main class="max-w-2xl mx-auto px-4 py-6">
<!-- Parent Profile Section -->
<section class="mb-8">
<div class="flex flex-col items-center mb-6">
<div class="relative">
<div class="w-32 h-32 rounded-full border-4 border-primary/20 bg-cover bg-center" data-alt="Portrait of a smiling young mother" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDX0eLFN1Z3vvxmrdAc2NZ3xn-y30GBXRNkoOG1ReO2eu1YqxcJS9dy2lsGBdGoMfvMKjPAMMCnq4M4r9P5dnBv4Xh5WddDgj1A1eoZ1qdpxJ8LjokGgFrZkjh9XFce3m3HsM0bLMMjrPOem3A8H0ezvb1PK8M5P7JFsTM6M6zryV4EOfG-fWA2cTVIscGnYKXOdiQAGXZkal2rkvsceix5uzYu0Lz5_KHEr-ITF9nksi07UIgNw1ud8DdqLmQtkGbC9A_-jkVeiJKe')"></div>
<button class="absolute bottom-0 right-0 bg-primary text-white p-2 rounded-full shadow-lg border-2 border-white dark:border-background-dark">
<span class="material-symbols-outlined text-sm">edit</span>
</button>
</div>
<p class="mt-4 text-sm text-slate-500 dark:text-slate-400">Sarah Jenkins</p>
</div>
<div class="space-y-4">
<div class="flex flex-col gap-1">
<label class="text-sm font-semibold px-1">Full Name</label>
<input class="w-full rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 focus:border-primary focus:ring-primary h-12 px-4" type="text" value="Sarah Jenkins"/>
</div>
<div class="flex flex-col gap-1">
<label class="text-sm font-semibold px-1">Phone Number</label>
<input class="w-full rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 focus:border-primary focus:ring-primary h-12 px-4" type="tel" value="+1 (555) 012-3456"/>
</div>
</div>
</section>
<!-- Children's Profiles Section -->
<section class="mb-8">
<div class="flex items-center justify-between mb-4">
<h2 class="text-lg font-bold">Children</h2>
<button class="flex items-center gap-1 text-primary text-sm font-bold">
<span class="material-symbols-outlined text-base">add_circle</span>
                    Add Child
                </button>
</div>
<div class="space-y-3">
<!-- Child 1 -->
<div class="flex items-center justify-between p-4 bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-cover bg-center bg-primary/10" data-alt="Smiling toddler wearing a blue hat" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBKTuHz0e9qXuOfiET0qn9XgOlLr3Cje6Xch-cxrmRxv76oM_T5FyDsV7ssSHoglb8w8ce1ebEY_anGKN9TXcc1wzzmpaD7AJ4ODsyhuapOW1i5BuhBiB2REqKacj88U8cqZbW2iPnZ1maH_MttKCPXqQWgD6lx0x3ug9jl8seyv64ewkAs7EOE40iGbQM07oS3yqrOBuvW2sw6YB2AK2006bucrIxMN-nVYo_jNhV_P34sCRaMLoWzDLtFz_e2jXAFXH1R_i7qpq9g')"></div>
<div>
<p class="font-bold">Leo Jenkins</p>
<p class="text-xs text-slate-500">Born: June 12, 2021</p>
</div>
</div>
<button class="text-slate-400">
<span class="material-symbols-outlined">chevron_right</span>
</button>
</div>
<!-- Child 2 -->
<div class="flex items-center justify-between p-4 bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-cover bg-center bg-primary/10" data-alt="Young girl with braided hair smiling" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuA5l-rDYDXRtwcJsrEKEWYQcE59cj0_PJtPfsP777du4pCPfxah9dIO8f_XIp9QDA9uG5diOF2MMU9nyWhxnsI0T_LSS02ve3hQkZdJ1bGji9h4AdoMhxcx6PnRZxxcpcA-viX5db9flFv6jlpiOEr4HF9rQmN1j9NhOJ5QQ_M9sMcdu9dR10bZp0JxD5RR553b6-Y2-uU7UCB_bdboAgp_vWR7PdnWpiqhDvvNgu_ExJFkdcbqiARbpc97oPG9LDBzrXUw2K17hOCQ')"></div>
<div>
<p class="font-bold">Maya Jenkins</p>
<p class="text-xs text-slate-500">Born: Jan 04, 2018</p>
</div>
</div>
<button class="text-slate-400">
<span class="material-symbols-outlined">chevron_right</span>
</button>
</div>
</div>
</section>
<!-- Security Settings Section -->
<section class="mb-8">
<h2 class="text-lg font-bold mb-4">Security</h2>
<div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 divide-y divide-slate-100 dark:divide-slate-800">
<button class="w-full flex items-center justify-between p-4 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-500">lock</span>
<span class="font-medium">Change Password</span>
</div>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</button>
<div class="w-full flex items-center justify-between p-4">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-500">fingerprint</span>
<div>
<p class="font-medium">Biometric Login</p>
<p class="text-xs text-slate-500">Use FaceID or Fingerprint</p>
</div>
</div>
<div class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</div>
</div>
<div class="w-full flex items-center justify-between p-4">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-500">verified_user</span>
<div>
<p class="font-medium">Two-Factor Auth</p>
<p class="text-xs text-slate-500">Secure your account</p>
</div>
</div>
<div class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</div>
</div>
</div>
</section>
<!-- Danger Zone -->
<section>
<button class="w-full py-4 text-red-500 font-bold border border-red-200 dark:border-red-900/30 bg-red-50 dark:bg-red-950/20 rounded-xl">
                Log Out
            </button>
</section>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 w-full bg-white dark:bg-background-dark border-t border-slate-200 dark:border-slate-800 pb-safe">
<div class="flex justify-around items-center h-16 max-w-2xl mx-auto">
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-medium">Home</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">ecg_heart</span>
<span class="text-[10px] font-medium">Health</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">calendar_today</span>
<span class="text-[10px] font-medium">Visits</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="text-[10px] font-medium">Settings</span>
</a>
</div>
</nav>
</body></html>
